name: observability-stack
services:

  # -------------------------
  # SEQ - Merkezi Loglama
  # -------------------------
  # seq:
  #   image: datalust/seq:2024.3
  #   container_name: seq
  #   restart: unless-stopped
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     SEQ_CACHE_SYSTEMRAMTARGET: 0.7
  #   ports:
  #     - "5341:80"
  #   volumes:
  #     - seq_data:/data
  #   healthcheck:
  #     test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - observability-network
  
  # -------------------------
  # OPENSEARCH - Log & Search Engine
  # -------------------------
  opensearch:
    image: opensearchproject/opensearch:3
    container_name: opensearch
    restart: unless-stopped
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"  # RAM kullanımını projenize göre artırabilirsiniz
      - DISABLE_INSTALL_DEMO_CONFIG=true          # Güvenlik eklentisi ayarları için (Demo mod kapalı)
      - DISABLE_SECURITY_PLUGIN=true              # Yerel test için güvenliği kapatıyoruz (HTTP üzerinden erişim)
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200" # Host 9200 dolu olabilir diye 9201'e aldım
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - observability-network

  # -------------------------
  # OPENSEARCH DASHBOARDS - UI
  # -------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: opensearch-dashboards
    restart: unless-stopped
    depends_on:
      - opensearch
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true     # Güvenliği opensearch ile uyumlu şekilde kapattık
    ports:
      - "5601:5601"                                 # Host 5601 Kibana için ayrılmış olabilir, 5602'ye aldım
    networks:
      - observability-network

  # -------------------------
  # ELASTICSEARCH
  # -------------------------
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
  #   container_name: elasticsearch
  #   restart: unless-stopped
  #   environment:
  #     discovery.type: single-node
  #     xpack.security.enabled: "false"
  #     ES_JAVA_OPTS: "-Xms1g -Xmx1g"
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elastic_data:/usr/share/elasticsearch/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #   networks:
  #     - observability-network

  # -------------------------
  # KIBANA
  # -------------------------
  # kibana:
  #   image: docker.elastic.co/kibana/kibana:8.13.4
  #   container_name: kibana
  #   restart: unless-stopped
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy
  #   environment:
  #     ELASTICSEARCH_HOSTS: http://elasticsearch:9200
  #   ports:
  #     - "5601:5601"
  #   networks:
  #     - observability-network

  # -------------------------
  # JAEGER - Traces
  # -------------------------
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    container_name: jaeger
    restart: unless-stopped
    environment:
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    volumes:
      - jaeger_data:/badger
    networks:
      - observability-network

  # -------------------------
  # PROMETHEUS - Metrikler
  # -------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d' # Disk dolmaması için 7 gün yeterli olabilir
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability-network

  # -------------------------
  # GRAFANA - Dashboard
  # -------------------------
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - observability-network

networks:
  observability-network:
    external: true

volumes:
  # seq_data:
  jaeger_data:
  prometheus_data:
  grafana_data:
  opensearch_data:
  # elastic_data: